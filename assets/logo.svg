<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .ring { fill: none; stroke: #b08850; stroke-width: 1; }
      .mono { font-family: 'Cormorant Garamond', Georgia, serif; fill: #1c1a18; }
      .rule { stroke: #b08850; stroke-width: 0.75; }
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" class="ring" />
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="80" class="ring" stroke-dasharray="4 3" />

  <!-- Monogram VS -->
  <text x="100" y="118" text-anchor="middle" class="mono"
        font-size="72" font-weight="300" letter-spacing="-2">VS</text>

  <!-- Top ornament line -->
  <line x1="64" y1="60" x2="136" y2="60" class="rule" />
  <line x1="72" y1="56" x2="128" y2="56" class="rule" stroke-opacity="0.5" />

  <!-- Bottom ornament line -->
  <line x1="64" y1="140" x2="136" y2="140" class="rule" />
  <line x1="72" y1="144" x2="128" y2="144" class="rule" stroke-opacity="0.5" />

  <!-- Corner diamonds -->
  <polygon points="100,48 103,52 100,56 97,52" fill="#b08850" />
  <polygon points="100,144 103,148 100,152 97,148" fill="#b08850" />
</svg>
